<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leitor de Código de Barras</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      padding: 20px;
    }
    .container {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 24px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #reader {
      width: 100%;
      aspect-ratio: 1/1;
      background: #12121a;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    #status {
      color: #8892b0;
      font-size: 0.9rem;
      margin-top: 12px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      background: #00d4ff;
      color: #0a0a0f;
      font-size: 1rem;
      margin-top: 12px;
      width: 100%;
    }
    .btn:hover { opacity:0.8; transform:scale(0.98); }
    .btn-secondary {
      background: #2a2a4a;
      color: #e0e0ff;
    }
    .btn-secondary:hover { background: #3a3a5a; }
    .hidden { display: none; }
    .scan-result {
      background: #12121a;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
      word-break: break-all;
    }
    .scan-result strong { color: #00d4ff; }
  </style>
</head>
<body>
<div class="container">
  <h1>📷 Leitor de Código de Barras</h1>
  <div id="reader"></div>
  <div id="status">Aguardando permissão da câmera...</div>
  <div id="result" class="scan-result hidden">
    <strong>Código lido:</strong> <span id="codigoLido"></span>
  </div>
  <button id="btnFechar" class="btn btn-secondary">Fechar e Voltar</button>
</div>

<script>
(function() {
  const statusEl = document.getElementById('status');
  const resultEl = document.getElementById('result');
  const codigoSpan = document.getElementById('codigoLido');
  const btnFechar = document.getElementById('btnFechar');

  // Obtém a URL de retorno (passada pela aplicação principal)
  const params = new URLSearchParams(window.location.search);
  const returnUrl = params.get('returnUrl') || window.location.origin + '/';

  let html5QrCode = null;
  let codigoDetectado = null;

  function emitirBeep() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.frequency.value = 880;
      oscillator.type = 'sine';
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.15);
    } catch(e) { /* fallback silencioso */ }
  }

  function iniciarScanner() {
    if (!document.getElementById('reader')) return;

    html5QrCode = new Html5Qrcode("reader");

    const config = {
      fps: 15,
      qrbox: { width: 300, height: 300 },
      aspectRatio: 1.0,
      formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39 ]
    };

    html5QrCode.start(
      { facingMode: "environment" },
      config,
      function(decodedText, decodedResult) {
        // Sucesso na leitura
        codigoDetectado = decodedText;
        statusEl.textContent = '✅ Código detectado!';
        resultEl.classList.remove('hidden');
        codigoSpan.textContent = decodedText;
        emitirBeep();

        // Para a câmera para economizar recursos
        if (html5QrCode) {
          html5QrCode.stop().then(() => {
            console.log('Leitura concluída, câmera parada.');
          }).catch(err => console.warn('Erro ao parar câmera:', err));
        }

        // Redireciona de volta para a aplicação principal após 1 segundo
        setTimeout(function() {
          // ===== ITEM 23: envia o código via postMessage para a janela que abriu o scanner =====
          // Isso evita o redirecionamento de URL, que não funciona quando a aplicação principal
          // roda dentro do sandbox de iframe do Google Apps Script (script.googleusercontent.com).
          if (window.opener && !window.opener.closed) {
            statusEl.textContent = '✅ Código enviado! Fechando...';
            try {
              window.opener.postMessage({ tipo: 'codigoBarrasDetectado', codigo: decodedText }, '*');
            } catch (erroPost) {
              console.warn('Erro ao enviar postMessage:', erroPost);
            }
            setTimeout(function() {
              window.close();
            }, 300);
          } else {
            // Fallback: nenhuma janela "opener" disponível (ex.: aberto fora de window.open) —
            // mantém o comportamento antigo de navegação por URL.
            const url = returnUrl + (returnUrl.includes('?') ? '&' : '?') + 'codigo=' + encodeURIComponent(decodedText);
            window.location.href = url;
          }
          // ===== FIM ITEM 23 =====
        }, 1000);
      },
      function(errorMessage) {
        // Ignora erros de leitura (callback contínuo)
        if (statusEl.textContent === 'Aguardando permissão da câmera...') {
          statusEl.textContent = '📸 Aponte para o código de barras...';
        }
      }
    ).catch(function(err) {
      statusEl.textContent = '❌ Erro ao acessar câmera: ' + err;
      console.error('Erro ao iniciar scanner:', err);
    });
  }

  // Verifica se o navegador suporta getUserMedia
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    iniciarScanner();
  } else {
    statusEl.textContent = '❌ Seu navegador não suporta acesso à câmera. Use a digitação manual.';
  }

  // Botão fechar (volta para a aplicação sem código)
  btnFechar.addEventListener('click', function() {
    if (html5QrCode) {
      html5QrCode.stop().catch(() => {});
    }
    if (window.opener && !window.opener.closed) {
      // ===== ITEM 23: com opener disponível, basta fechar a janela — não navegar por URL =====
      window.close();
      return;
    }
    window.close(); // Tenta fechar a aba
    // Fallback: redireciona para a página inicial (apenas quando não há opener)
    window.location.href = returnUrl;
  });

  // Se o usuário fechar a aba, tentamos parar a câmera
  window.addEventListener('beforeunload', function() {
    if (html5QrCode) {
      html5QrCode.stop().catch(() => {});
    }
  });
})();
</script>
</body>
</html>
