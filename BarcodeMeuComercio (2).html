<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leitor de código de barras</title>
<style>
  :root{
    --bg:#0F1522;
    --surface:#17212F;
    --ink:#E8EDF5;
    --ink-soft:#93A1B5;
    --primary:#4C86E0;
    --danger:#E5534B;
    --success:#3DC17A;
    --line:#263344;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--ink);
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
  }
  .tela{
    display:flex; flex-direction:column; height:100%;
    min-height:100vh;
  }
  header{
    padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line);
    background:var(--surface);
  }
  header h1{
    font-size:1rem; margin:0; font-weight:600;
  }
  header button{
    background:transparent; border:none; color:var(--ink-soft);
    font-size:1.4rem; line-height:1; cursor:pointer; padding:4px 8px;
  }
  .visor{
    position:relative;
    flex:1;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  #video{
    width:100%; height:100%; object-fit:cover;
  }
  .mira{
    position:absolute;
    left:8%; right:8%; top:38%;
    height:24%;
    border:2px solid var(--primary);
    border-radius:12px;
    box-shadow:0 0 0 999px rgba(0,0,0,0.35);
    pointer-events:none;
  }
  .aviso{
    position:absolute;
    bottom:14px; left:14px; right:14px;
    text-align:center;
    font-size:.85rem;
    color:#fff;
    background:rgba(0,0,0,0.55);
    padding:8px 12px;
    border-radius:10px;
  }
  .rodape{
    padding:14px 16px 18px;
    background:var(--surface);
    border-top:1px solid var(--line);
  }
  .rodape p{
    margin:0 0 10px;
    font-size:.8rem;
    color:var(--ink-soft);
    text-align:center;
  }
  .manual{
    display:flex; gap:8px;
  }
  .manual input{
    flex:1;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--ink);
    border-radius:10px;
    padding:10px 12px;
    font-size:.95rem;
  }
  .manual button{
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:0 16px;
    font-weight:600;
    font-size:.9rem;
    cursor:pointer;
  }
  .estado-erro{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:24px;
    text-align:center;
    color:var(--ink-soft);
    height:100%;
  }
  .estado-erro.ativo{ display:flex; }
  .estado-erro svg{ width:48px; height:48px; color:var(--danger); }
  .estado-erro button{
    background:var(--primary);
    color:#fff; border:none; border-radius:10px;
    padding:10px 18px; font-weight:600; cursor:pointer;
  }
</style>
</head>
<body>
<div class="tela">
  <header>
    <h1>📷 Aponte para o código de barras</h1>
    <button type="button" id="btnFechar" aria-label="Fechar">×</button>
  </header>

  <div class="visor" id="visor">
    <video id="video" autoplay playsinline muted></video>
    <div class="mira"></div>
    <div class="aviso" id="aviso">Iniciando câmera...</div>
    <div class="estado-erro" id="estadoErro">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
      </svg>
      <div id="mensagemErro">Não foi possível acessar a câmera.</div>
      <button type="button" id="btnTentarNovamente">Tentar novamente</button>
    </div>
  </div>

  <div class="rodape">
    <p>Ou digite o código manualmente:</p>
    <div class="manual">
      <input type="text" id="codigoManual" inputmode="numeric" placeholder="Digite o código de barras">
      <button type="button" id="btnUsarManual">Usar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<script>
  var leitor = null;
  var codigoEnviado = false;

  function enviarCodigo(codigo) {
    if (codigoEnviado) return;
    codigoEnviado = true;
    pararCamera();
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ tipo: 'mc-codigo-barras', codigo: String(codigo).trim() }, '*');
    }
    window.close();
    // Caso o navegador não permita fechar automaticamente (ex: aba em vez de pop-up),
    // mostra confirmação para o usuário fechar manualmente.
    setTimeout(function () {
      document.getElementById('aviso').textContent = 'Código enviado! Você já pode fechar esta janela.';
    }, 300);
  }

  function pararCamera() {
    try {
      if (leitor) leitor.reset();
    } catch (e) {}
    var video = document.getElementById('video');
    if (video && video.srcObject) {
      video.srcObject.getTracks().forEach(function (faixa) { faixa.stop(); });
      video.srcObject = null;
    }
  }

  function mostrarErro(mensagem) {
    document.getElementById('visor').querySelector('video').style.display = 'none';
    document.querySelector('.mira').style.display = 'none';
    document.getElementById('aviso').style.display = 'none';
    document.getElementById('mensagemErro').textContent = mensagem;
    document.getElementById('estadoErro').classList.add('ativo');
  }

  function iniciarLeitura() {
    codigoEnviado = false;
    document.getElementById('estadoErro').classList.remove('ativo');
    var video = document.getElementById('video');
    video.style.display = '';
    document.querySelector('.mira').style.display = '';
    document.getElementById('aviso').style.display = '';
    document.getElementById('aviso').textContent = 'Iniciando câmera...';

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      mostrarErro('Este navegador não permite acesso à câmera. Digite o código manualmente abaixo.');
      return;
    }

    var hints = new Map();
    var formatos = [
      ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.ITF, ZXing.BarcodeFormat.QR_CODE
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formatos);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    leitor = new ZXing.BrowserMultiFormatReader(hints);

    leitor.listVideoInputDevices().then(function (dispositivos) {
      var idCamera = null;
      for (var i = 0; i < dispositivos.length; i++) {
        var rotulo = (dispositivos[i].label || '').toLowerCase();
        if (rotulo.indexOf('back') > -1 || rotulo.indexOf('traseira') > -1 || rotulo.indexOf('rear') > -1) {
          idCamera = dispositivos[i].deviceId;
          break;
        }
      }
      if (!idCamera && dispositivos.length > 0) {
        idCamera = dispositivos[dispositivos.length - 1].deviceId;
      }

      var restricoes = idCamera
        ? { deviceId: { exact: idCamera } }
        : { facingMode: { ideal: 'environment' } };

      leitor.decodeFromConstraints(
        { audio: false, video: restricoes },
        'video',
        function (resultado, erro) {
          document.getElementById('aviso').textContent = 'Aponte a câmera diretamente para o código.';
          if (resultado) {
            enviarCodigo(resultado.getText());
          }
        }
      ).catch(function () {
        mostrarErro('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
      });
    }).catch(function () {
      mostrarErro('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
    });
  }

  document.getElementById('btnFechar').addEventListener('click', function () {
    pararCamera();
    window.close();
  });

  document.getElementById('btnTentarNovamente').addEventListener('click', iniciarLeitura);

  document.getElementById('btnUsarManual').addEventListener('click', function () {
    var valor = document.getElementById('codigoManual').value.trim();
    if (valor) enviarCodigo(valor);
  });

  document.getElementById('codigoManual').addEventListener('keydown', function (ev) {
    if (ev.key === 'Enter') {
      ev.preventDefault();
      var valor = this.value.trim();
      if (valor) enviarCodigo(valor);
    }
  });

  window.addEventListener('beforeunload', pararCamera);

  iniciarLeitura();
</script>
</body>
</html>
