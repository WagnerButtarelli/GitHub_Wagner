<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Tarefas Inteligentes</title>

  <!-- Google Sans / Product Sans -->
  <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Bibliotecas para exportação PDF e Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: 'Product Sans', 'Inter', sans-serif;
      transition: background-color 0.2s, color 0.2s;
      font-size: 18px;
    }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    @media (max-width: 768px) {
      .text-\[9px\], .text-\[10px\], .text-\[11px\], .text-xs { font-size: 15px !important; line-height: 1.4rem !important; }
      .text-sm { font-size: 17px !important; line-height: 1.5rem !important; }
      .text-base, .text-md { font-size: 19px !important; line-height: 1.6rem !important; }
      .text-lg { font-size: 21px !important; }
      input, select, textarea { font-size: 18px !important; padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
      label { font-size: 15px !important; font-weight: 700 !important; }
      button { font-size: 16px !important; padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.4); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.7); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.25s cubic-bezier(0.16,1,0.3,1) forwards; }
    .glass-card {
      background: rgba(30,41,59,0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .light .glass-card {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(0,0,0,0.06);
    }
  </style>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { brand: { dark:'#0f172a', surface:'#1e293b', lightBg:'#f8fafc', lightSurface:'#ffffff' } },
          fontFamily: { sans: ['"Product Sans"','sans-serif'], mono: ['"JetBrains Mono"','monospace'] }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0b0f19] text-slate-100 overflow-x-hidden min-h-screen dark:bg-[#0b0f19] dark:text-slate-100 light:bg-slate-50 light:text-slate-900 transition-colors duration-200">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    function formatDateDDMMYYYY(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
      return dateStr;
    }

    function compressImage(file, maxWidth=800, quality=0.7) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width, height = img.height;
            if (width > maxWidth) { height = (maxWidth/width)*height; width = maxWidth; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function App() {
      // Estados principais
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [darkMode, setDarkMode] = useState(true);
      const [isLoading, setIsLoading] = useState(false);
      const [notificacao, setNotificacao] = useState(null);

      // Dados
      const [tarefas, setTarefas] = useState([]);
      const [acessos, setAcessos] = useState([]);
      const [permissoes, setPermissoes] = useState([]);
      const [driveSpaceInfo, setDriveSpaceInfo] = useState(null);

      // Filtros
      const [filtroBusca, setFiltroBusca] = useState('');
      const [filtroStatus, setFiltroStatus] = useState('');
      const [filtroTipo, setFiltroTipo] = useState('');
      const [filtroLoja, setFiltroLoja] = useState('');
      const [filtroExecutor, setFiltroExecutor] = useState('');

      // Filtros relatórios
      const [filtroDataInicio, setFiltroDataInicio] = useState('');
      const [filtroDataFim, setFiltroDataFim] = useState('');
      const [filtroExecutorRel, setFiltroExecutorRel] = useState('');
      const [filtroLojaRel, setFiltroLojaRel] = useState('');

      // Modais
      const [showAddModal, setShowAddModal] = useState(false);
      const [showViewModal, setShowViewModal] = useState(false);
      const [selectedTask, setSelectedTask] = useState(null);
      const [novaTarefa, setNovaTarefa] = useState({ tipoTarefa:'', executor:'', nomeLoja:'', dataLimite:'', descricao:'', foto:'' });
      const [loadingSalvar, setLoadingSalvar] = useState(false);

      // Novo colaborador
      const [novoAcesso, setNovoAcesso] = useState({ nome:'', usuario:'', senha:'', perfil:'', loja:'', email:'', telefone:'' });

      // Modo de visualização
      const [viewMode, setViewMode] = useState('cards');

      // Observação e foto de execução
      const [observacaoExecucao, setObservacaoExecucao] = useState('');
      const [fotoExecucaoFile, setFotoExecucaoFile] = useState(null);
      const [fotoExecucaoPreview, setFotoExecucaoPreview] = useState('');
      const [loadingAtualizacao, setLoadingAtualizacao] = useState(false);

      // Estados para edição de acesso
      const [editAcesso, setEditAcesso] = useState(null);
      const [showEditModal, setShowEditModal] = useState(false);

      const mostrarNotificacao = (texto, tipo='sucesso') => {
        setNotificacao({ texto, tipo });
        setTimeout(() => setNotificacao(null), 3500);
      };

      // Carregar dados da planilha
      const carregarDadosDoPlanilha = () => {
        setIsLoading(true);
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((dadosTar) => { setTarefas(dadosTar || []); setIsLoading(false); })
            .withFailureHandler((err) => { mostrarNotificacao("Erro ao ler tarefas: "+err.message, "erro"); setIsLoading(false); })
            .lerTarefas();

          google.script.run
            .withSuccessHandler((dadosAc) => setAcessos(dadosAc || []))
            .lerAcessos();

          google.script.run
            .withSuccessHandler((dadosPerm) => setPermissoes(dadosPerm || []))
            .lerPermissoes();

          google.script.run
            .withSuccessHandler((info) => setDriveSpaceInfo(info))
            .withFailureHandler(() => setDriveSpaceInfo(null))
            .obterEspacoPasta('16J48GgLEmurDT79SxxZfuXYoSticoZtPvIS0ZubG4sM');
        } else {
          // Simulação local (apenas para desenvolvimento)
          setTimeout(() => {
            setTarefas([
              { id:"T-01", tipoTarefa:"Inventário de Estoque", executor:"Edwinson", nomeLoja:"Loja Centro", dataLimite:"2026-06-25", descricao:"Contagem anual e auditoria geral de estoque.", foto:"", status:"Concluída", observacao:"", fotoExecucao:"" },
              { id:"T-02", tipoTarefa:"Limpeza / Organização", executor:"Wagner", nomeLoja:"Loja Norte", dataLimite:"2026-06-28", descricao:"Limpeza profunda dos aparelhos de ar-condicionado.", foto:"", status:"Vencida", observacao:"", fotoExecucao:"" }
            ]);
            setAcessos([
              { id:"1", nome:"Edwin Alves", usuario:"Edwinson", senha:"1", perfil:"Gerente", loja:"Loja Centro", email:"", telefone:"", status:"Ativo" },
              { id:"2", nome:"Wagner Oliveira", usuario:"Wagner", senha:"1276", perfil:"Gerente", loja:"Loja Norte", email:"", telefone:"", status:"Ativo" },
              { id:"3", nome:"Francisco Almei", usuario:"Francisco", senha:"3", perfil:"Executor", loja:"Loja Sul", email:"", telefone:"", status:"Ativo" }
            ]);
            setPermissoes([
              { perfil:"Gerente", dashboard:true, tarefas:true, relatorio:true, visualizar:true, incluir:true, excluir:true, exportar:true },
              { perfil:"Executor", dashboard:false, tarefas:true, relatorio:true, visualizar:true, incluir:true, excluir:false, exportar:false }
            ]);
            setDriveSpaceInfo({ folderSize:125000000, quotaTotal:15*1024*1024*1024, quotaUsed:5*1024*1024*1024, percent:0.8 });
            setIsLoading(false);
          }, 800);
        }
      };

      useEffect(() => { carregarDadosDoPlanilha(); }, []);

      useEffect(() => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }, [isAuthenticated, activeTab, tarefas, notificacao, showAddModal, showViewModal, acessos, driveSpaceInfo, showEditModal]);

      useEffect(() => {
        const rootNode = document.documentElement;
        if (darkMode) { rootNode.classList.add('dark'); rootNode.classList.remove('light'); rootNode.style.backgroundColor='#0b0f19'; }
        else { rootNode.classList.add('light'); rootNode.classList.remove('dark'); rootNode.style.backgroundColor='#f8fafc'; }
      }, [darkMode]);

      // Atualizar o perfil do novoAcesso quando permissoes carregar
      useEffect(() => {
        if (permissoes.length > 0 && !novoAcesso.perfil) {
          const perfisUnicos = [...new Set(permissoes.map(p => p.perfil))];
          setNovoAcesso(prev => ({ ...prev, perfil: perfisUnicos[0] || '' }));
        }
      }, [permissoes]);

      const activePermissions = useMemo(() => {
        if (!currentUser) return { dashboard:false, tarefas:true, relatorio:false, visualizar:true, incluir:false, excluir:false, exportar:false };
        const matching = permissoes.find(p => p.perfil.toLowerCase() === currentUser.perfil.toLowerCase());
        return matching || { dashboard:true, tarefas:true, relatorio:true, visualizar:true, incluir:true, excluir:true, exportar:true };
      }, [currentUser, permissoes]);

      const lojasDisponiveis = useMemo(() => {
        const lojas = acessos.map(a => a.loja).filter(l => l && l.trim() !== '');
        return [...new Set(lojas)];
      }, [acessos]);

      const executoresDisponiveis = useMemo(() => {
        const execs = tarefas.map(t => t.executor).filter(e => e && e.trim() !== '');
        return [...new Set(execs)];
      }, [tarefas]);

      // Login
      const handleLoginSubmit = (e) => {
        e.preventDefault();
        const u = e.target.username.value;
        const s = e.target.password.value;
        setIsLoading(true);

        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler((res) => {
              setIsLoading(false);
              if (res.sucesso) {
                setCurrentUser(res.usuario);
                setIsAuthenticated(true);
                mostrarNotificacao(`Olá, ${res.usuario.nome}!`);
              } else {
                mostrarNotificacao(res.mensagem, "erro");
              }
            })
            .withFailureHandler((err) => {
              setIsLoading(false);
              mostrarNotificacao("Erro no servidor: "+err.message, "erro");
            })
            .autenticarUsuario(u, s);
        } else {
          // Simulação local
          setTimeout(() => {
            setIsLoading(false);
            const found = acessos.find(ac => ac.usuario.toLowerCase() === u.trim().toLowerCase() && ac.senha === s);
            if (found) {
              setCurrentUser(found);
              setIsAuthenticated(true);
              mostrarNotificacao(`Sessão iniciada como ${found.nome}`);
            } else {
              mostrarNotificacao("Usuário ou senha inválidos.", "erro");
            }
          }, 600);
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setIsAuthenticated(false);
        mostrarNotificacao("Sessão finalizada.");
      };

      // Salvar tarefa
      const handleSaveTarefa = (e) => {
        e.preventDefault();
        if (!activePermissions.incluir) {
          mostrarNotificacao("Seu perfil não tem permissão para incluir tarefas.", "erro");
          return;
        }
        setLoadingSalvar(true);
        const count = tarefas.length + 1;
        const nextId = "T-" + String(count).padStart(2,'0');
        const tObj = { ...novaTarefa, id: nextId, status:'Pendente', observacao:'', fotoExecucao:'' };

        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(() => {
              setLoadingSalvar(false);
              setShowAddModal(false);
              mostrarNotificacao("Tarefa gravada com sucesso!");
              setNovaTarefa({ tipoTarefa:'', executor:'', nomeLoja:'', dataLimite:'', descricao:'', foto:'' });
              carregarDadosDoPlanilha();
            })
            .withFailureHandler((err) => {
              setLoadingSalvar(false);
              mostrarNotificacao("Falha ao gravar: "+err.message, "erro");
            })
            .cadastrarTarefa(tObj, novaTarefa.foto);
        } else {
          setTimeout(() => {
            setTarefas([...tarefas, tObj]);
            setLoadingSalvar(false);
            setShowAddModal(false);
            mostrarNotificacao("Tarefa incluída (Simulação)!");
            setNovaTarefa({ tipoTarefa:'', executor:'', nomeLoja:'', dataLimite:'', descricao:'', foto:'' });
          }, 600);
        }
      };

      const handleFotoChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => setNovaTarefa({ ...novaTarefa, foto: reader.result });
        reader.readAsDataURL(file);
      };

      // Alterar status
      const handleAlterarStatus = (id, novoStatus) => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(() => { mostrarNotificacao(`Tarefa atualizada para ${novoStatus}`); carregarDadosDoPlanilha(); })
            .withFailureHandler((err) => mostrarNotificacao("Erro ao atualizar: "+err.message, "erro"))
            .atualizarStatusTarefa(id, novoStatus);
        } else {
          setTarefas(tarefas.map(t => t.id===id ? {...t, status:novoStatus} : t));
          mostrarNotificacao(`Status alterado para ${novoStatus} (Simulado).`);
        }
      };

      // Excluir tarefa
      const handleDeletarTarefa = (id) => {
        if (!activePermissions.excluir) { mostrarNotificacao("Sem permissão para excluir.", "erro"); return; }
        if (!confirm("Excluir esta tarefa definitivamente da planilha?")) return;
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(() => { mostrarNotificacao("Tarefa excluída definitivamente!"); carregarDadosDoPlanilha(); })
            .withFailureHandler((err) => mostrarNotificacao("Erro: "+err.message, "erro"))
            .excluirTarefaPlanilha(id);
        } else {
          setTarefas(tarefas.filter(t => t.id!==id));
          mostrarNotificacao("Tarefa removida (Simulado).");
        }
      };

      // Atualizar observação e foto de execução
      const handleAtualizarExecucao = async () => {
        if (!selectedTask) return;
        setLoadingAtualizacao(true);
        let fotoBase64 = '';
        if (fotoExecucaoFile) fotoBase64 = await compressImage(fotoExecucaoFile, 800, 0.7);
        const payload = { id: selectedTask.id, observacao: observacaoExecucao, fotoExecucao: fotoBase64 };

        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(() => {
              setLoadingAtualizacao(false);
              mostrarNotificacao("Observação e foto atualizadas!");
              setShowViewModal(false);
              setObservacaoExecucao('');
              setFotoExecucaoFile(null);
              setFotoExecucaoPreview('');
              carregarDadosDoPlanilha();
            })
            .withFailureHandler((err) => {
              setLoadingAtualizacao(false);
              mostrarNotificacao("Erro ao atualizar: "+err.message, "erro");
            })
            .atualizarTarefaComObservacao(payload.id, payload.observacao, payload.fotoExecucao);
        } else {
          setTimeout(() => {
            setTarefas(tarefas.map(t => t.id===selectedTask.id ? {...t, observacao:observacaoExecucao, fotoExecucao:fotoBase64||t.fotoExecucao} : t));
            setLoadingAtualizacao(false);
            setShowViewModal(false);
            setObservacaoExecucao('');
            setFotoExecucaoFile(null);
            setFotoExecucaoPreview('');
            mostrarNotificacao("Atualizado (Simulação)");
          }, 600);
        }
      };

      // Adicionar colaborador
      const handleAdicionarAcesso = (e) => {
        e.preventDefault();
        const nid = String(acessos.length + 1);
        const nobj = { ...novoAcesso, id: nid, status:"Ativo" };

        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(() => {
              mostrarNotificacao("Colaborador gravado com sucesso!");
              setNovoAcesso({ nome:'', usuario:'', senha:'', perfil: [...new Set(permissoes.map(p => p.perfil))][0] || '', loja:lojasDisponiveis[0]||'', email:'', telefone:'' });
              carregarDadosDoPlanilha();
            })
            .withFailureHandler((err) => mostrarNotificacao("Erro: "+err.message, "erro"))
            .incluirNovoAcesso(nobj);
        } else {
          setAcessos([...acessos, nobj]);
          mostrarNotificacao("Novo colaborador cadastrado (Simulado)!");
          setNovoAcesso({ nome:'', usuario:'', senha:'', perfil:[...new Set(permissoes.map(p => p.perfil))][0] || '', loja:lojasDisponiveis[0]||'', email:'', telefone:'' });
        }
      };

      // Excluir acesso
      const handleExcluirAcesso = (id) => {
        if (!confirm("Deseja realmente excluir este colaborador?")) return;
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(() => {
              mostrarNotificacao("Colaborador excluído com sucesso!");
              carregarDadosDoPlanilha();
            })
            .withFailureHandler((err) => mostrarNotificacao("Erro ao excluir: "+err.message, "erro"))
            .excluirAcesso(id);
        } else {
          setAcessos(acessos.filter(a => a.id !== id));
          mostrarNotificacao("Colaborador removido (Simulação).");
        }
      };

      // Editar acesso
      const handleEditarAcesso = (e) => {
        e.preventDefault();
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(() => {
              mostrarNotificacao("Dados atualizados com sucesso!");
              setShowEditModal(false);
              carregarDadosDoPlanilha();
            })
            .withFailureHandler((err) => mostrarNotificacao("Erro ao atualizar: "+err.message, "erro"))
            .atualizarAcesso(editAcesso);
        } else {
          setAcessos(acessos.map(a => a.id === editAcesso.id ? editAcesso : a));
          setShowEditModal(false);
          mostrarNotificacao("Dados atualizados (Simulação).");
        }
      };

      // Estatísticas
      const stats = useMemo(() => {
        const total = tarefas.length;
        const concluidas = tarefas.filter(t => t.status==='Concluída').length;
        const pendentes = tarefas.filter(t => t.status==='Pendente').length;
        const vencidas = tarefas.filter(t => t.status==='Vencida').length;
        const progresso = total>0 ? Math.round((concluidas/total)*100) : 0;
        const porExecutor = {};
        tarefas.forEach(t => {
          if (!porExecutor[t.executor]) porExecutor[t.executor] = { total:0, concluidas:0, pendentes:0, vencidas:0 };
          porExecutor[t.executor].total++;
          if (t.status==='Concluída') porExecutor[t.executor].concluidas++;
          else if (t.status==='Pendente') porExecutor[t.executor].pendentes++;
          else if (t.status==='Vencida') porExecutor[t.executor].vencidas++;
        });
        const proximas = tarefas.filter(t=>t.status==='Pendente').sort((a,b)=>a.dataLimite.localeCompare(b.dataLimite)).slice(0,5);
        return { total, concluidas, pendentes, vencidas, progresso, porExecutor, proximas };
      }, [tarefas]);

      // Tarefas filtradas (aba tarefas)
      const tarefasFiltradas = useMemo(() => {
        return tarefas.filter(t => {
          const matchBusca = !filtroBusca || t.tipoTarefa.toLowerCase().includes(filtroBusca.toLowerCase()) || t.descricao.toLowerCase().includes(filtroBusca.toLowerCase()) || t.id.toLowerCase().includes(filtroBusca.toLowerCase());
          const matchStatus = !filtroStatus || t.status===filtroStatus;
          const matchTipo = !filtroTipo || t.tipoTarefa===filtroTipo;
          const matchLoja = !filtroLoja || t.nomeLoja===filtroLoja;
          const matchExecutor = !filtroExecutor || t.executor===filtroExecutor;
          return matchBusca && matchStatus && matchTipo && matchLoja && matchExecutor;
        });
      }, [tarefas, filtroBusca, filtroStatus, filtroTipo, filtroLoja, filtroExecutor]);

      // Tarefas filtradas (relatórios)
      const tarefasRelFiltradas = useMemo(() => {
        return tarefas.filter(t => {
          let match = true;
          if (filtroDataInicio && t.dataLimite < filtroDataInicio) match = false;
          if (filtroDataFim && t.dataLimite > filtroDataFim) match = false;
          if (filtroExecutorRel && t.executor !== filtroExecutorRel) match = false;
          if (filtroLojaRel && t.nomeLoja !== filtroLojaRel) match = false;
          return match;
        });
      }, [tarefas, filtroDataInicio, filtroDataFim, filtroExecutorRel, filtroLojaRel]);

      // Exportações
      const handleExportCsv = () => {
        if (!activePermissions.exportar) { mostrarNotificacao("Sem permissão para exportar.", "erro"); return; }
        let csv = "ID,Tipo da Tarefa,Executor,Loja,Data Limite,Status,Descricao\n";
        tarefasRelFiltradas.forEach(t => {

    scale: 2,
    backgroundColor: '#ffffff',
    useCORS: true,
    logging: false
  }).then((canvas) => {
    document.body.removeChild(container);
    const imgData = canvas.toDataURL('image/png');

    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
    pdf.save('relatorio_tarefas.pdf');
    mostrarNotificacao("PDF gerado com sucesso!");
  }).catch((err) => {
    document.body.removeChild(container);
    mostrarNotificacao("Erro ao gerar PDF.", "erro");
  });
};

                <form onSubmit={handleSaveTarefa} className="space-y-4">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Tipo da Tarefa</label><input type="text" required value={novaTarefa.tipoTarefa} onChange={(e)=>setNovaTarefa({...novaTarefa, tipoTarefa:e.target.value})} placeholder="Ex: Inventário, Limpeza" className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500" /></div>
                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Executor Designado</label><select required value={novaTarefa.executor} onChange={(e)=>setNovaTarefa({...novaTarefa, executor:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500"><option value="">Selecione</option>{acessos.map(ac=><option key={ac.id} value={ac.usuario}>{ac.usuario}</option>)}</select></div>
                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Loja Relacionada</label><select required value={novaTarefa.nomeLoja} onChange={(e)=>setNovaTarefa({...novaTarefa, nomeLoja:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500"><option value="">Selecione</option>{lojasDisponiveis.map(loja=><option key={loja} value={loja}>{loja}</option>)}</select></div>
                    <div className="space-y-1"><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Data Limite</label><input type="date" required value={novaTarefa.dataLimite} onChange={(e)=>setNovaTarefa({...novaTarefa, dataLimite:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500 font-mono" /></div>
                  </div>
                  <div className="space-y-1"><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Descrição</label><textarea rows="3" required value={novaTarefa.descricao} onChange={(e)=>setNovaTarefa({...novaTarefa, descricao:e.target.value})} placeholder="Descreva em detalhes..." className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500"></textarea></div>
                  <div className="space-y-2"><label className="text-[10px] font-bold text-slate-300 font-mono uppercase block">Foto Comprovante</label><input type="file" accept="image/*" onChange={handleFotoChange} className="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/25" />{novaTarefa.foto && <div className="w-24 h-16 rounded border border-white/5 overflow-hidden mt-1.5 bg-slate-900"><img src={novaTarefa.foto} className="w-full h-full object-cover" /></div>}</div>
                  <div className="flex justify-end gap-3 pt-4 border-t border-white/5">
                    <button type="button" onClick={()=>setShowAddModal(false)} className="px-4 py-2 bg-slate-800 hover:bg-slate-750 text-slate-300 rounded-xl text-xs font-semibold cursor-pointer">Cancelar</button>
                    <button type="submit" disabled={loadingSalvar} className="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 disabled:bg-indigo-800 text-white rounded-xl text-xs font-bold shadow-md shadow-indigo-600/15 cursor-pointer">{loadingSalvar?"Gravando...":"Confirmar Gravação"}</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal Detalhes da Tarefa */}
          {showViewModal && selectedTask && (
            <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
              <div className="w-full max-w-2xl glass-card rounded-2xl p-6 border border-white/10 shadow-2xl relative my-8">
                <button onClick={()=>setShowViewModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white"><i data-lucide="x" className="w-5 h-5"></i></button>
                <div className="mb-4"><span className="text-[10px] font-mono font-bold text-indigo-400 bg-indigo-500/10 px-2.5 py-1 rounded">{selectedTask.id}</span><h3 className="text-base font-bold text-slate-100 dark:text-slate-100 light:text-slate-950 mt-2">{selectedTask.tipoTarefa}</h3></div>
                <div className="space-y-4">
                  <div className="p-3 bg-slate-900/60 dark:bg-slate-900/60 light:bg-slate-100 rounded-xl border border-white/5 space-y-2"><p className="text-xs text-slate-300 dark:text-slate-300 light:text-slate-700 leading-relaxed">{selectedTask.descricao}</p></div>
                  <div className="grid grid-cols-2 gap-4 text-xs font-mono text-slate-400 dark:text-slate-400 light:text-slate-600 border-t border-white/5 pt-3">
                    <div><span className="text-[10px] font-bold uppercase text-slate-500 block">Executor</span><strong className="text-slate-200 dark:text-slate-200 light:text-slate-800 font-semibold">{selectedTask.executor}</strong></div>
                    <div><span className="text-[10px] font-bold uppercase text-slate-500 block">Unidade</span><strong className="text-slate-200 dark:text-slate-200 light:text-slate-800 font-semibold">{selectedTask.nomeLoja}</strong></div>
                    <div><span className="text-[10px] font-bold uppercase text-slate-500 block">Data Limite</span><strong className="text-slate-200 dark:text-slate-200 light:text-slate-800 font-semibold">{selectedTask.dataLimite}</strong></div>
                    <div><span className="text-[10px] font-bold uppercase text-slate-500 block">Status</span><strong className="text-indigo-400 font-bold">{selectedTask.status}</strong></div>
                  </div>
                  {selectedTask.foto && (
                    <div className="space-y-1"><span className="text-[10px] font-mono font-bold uppercase text-slate-500">Comprovante Inicial</span><div className="w-full h-40 rounded-xl border border-white/5 overflow-hidden bg-slate-900">{selectedTask.foto.startsWith("http")?<a href={selectedTask.foto} target="_blank" rel="noopener noreferrer" className="relative group block w-full h-full"><img src={selectedTask.foto} className="w-full h-full object-cover" /><div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><span className="text-xs font-bold text-white flex items-center gap-1"><i data-lucide="external-link" className="w-4 h-4"></i>Ver no Drive</span></div></a>:<img src={selectedTask.foto} className="w-full h-full object-cover" />}</div></div>
                  )}
                  <div className="border-t border-white/5 pt-4 space-y-3">
                    <h4 className="text-xs font-bold text-indigo-400 font-mono uppercase">Execução da Tarefa</h4>
                    <div><label className="text-[10px] font-bold text-slate-300 font-mono uppercase block mb-1">Observação da Execução</label><textarea rows="3" value={observacaoExecucao} onChange={(e)=>setObservacaoExecucao(e.target.value)} placeholder="Descreva como foi executada..." className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500"></textarea></div>
                    <div><label className="text-[10px] font-bold text-slate-300 font-mono uppercase block mb-1">Foto de Execução</label><input type="file" accept="image/*" onChange={async (e)=>{const file=e.target.files[0]; if(file){setFotoExecucaoFile(file); const compressed=await compressImage(file,400,0.6); setFotoExecucaoPreview(compressed);}}} className="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/25" />{fotoExecucaoPreview && <div className="mt-2 w-32 h-24 rounded border border-white/5 overflow-hidden bg-slate-900"><img src={fotoExecucaoPreview} className="w-full h-full object-cover" /></div>}{selectedTask.fotoExecucao && !fotoExecucaoPreview && <div className="mt-2 w-32 h-24 rounded border border-white/5 overflow-hidden bg-slate-900"><img src={selectedTask.fotoExecucao} className="w-full h-full object-cover" /></div>}</div>
                    <div className="flex justify-end"><button onClick={handleAtualizarExecucao} disabled={loadingAtualizacao} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-bold shadow-md flex items-center gap-1 cursor-pointer disabled:opacity-50"><i data-lucide="save" className="w-4 h-4"></i>{loadingAtualizacao?"Salvando...":"Salvar Observação e Foto"}</button></div>
                  </div>
                  <div className="flex justify-between items-center pt-4 border-t border-white/5">
                    {selectedTask.status!=='Concluída' ? <button onClick={()=>{handleAlterarStatus(selectedTask.id,'Concluída'); setShowViewModal(false);}} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-bold shadow-md flex items-center gap-1 cursor-pointer"><i data-lucide="check" className="w-4 h-4"></i><span>Marcar como Concluída</span></button> : <span className="text-xs text-emerald-400 font-bold flex items-center gap-1 font-mono"><i data-lucide="check-circle" className="w-4 h-4"></i>Tarefa Finalizada</span>}
                    <button onClick={()=>setShowViewModal(false)} className="px-4 py-2 bg-slate-800 hover:bg-slate-750 text-slate-300 rounded-xl text-xs font-semibold cursor-pointer">Fechar</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Modal Editar Colaborador */}
          {showEditModal && editAcesso && (
            <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
              <div className="w-full max-w-2xl glass-card rounded-2xl p-6 border border-white/10 shadow-2xl relative my-8">
                <button onClick={()=>setShowEditModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white"><i data-lucide="x" className="w-5 h-5"></i></button>
                <div className="mb-6"><h3 className="text-base font-bold">Editar Colaborador</h3><p className="text-xs text-slate-400">Atualize as informações de acesso</p></div>
                <form onSubmit={handleEditarAcesso} className="space-y-4">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Nome</label><input type="text" required value={editAcesso.nome} onChange={(e)=>setEditAcesso({...editAcesso, nome:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500" /></div>
                    <div><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Usuário</label><input type="text" required value={editAcesso.usuario} onChange={(e)=>setEditAcesso({...editAcesso, usuario:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500" /></div>
                    <div><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Senha</label><input type="text" required value={editAcesso.senha} onChange={(e)=>setEditAcesso({...editAcesso, senha:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500" /></div>
                    <div><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Perfil</label>
                      <select value={editAcesso.perfil} onChange={(e)=>setEditAcesso({...editAcesso, perfil:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500">
                        {[...new Set(permissoes.map(p => p.perfil))].map(perfil => (
                          <option key={perfil} value={perfil}>{perfil}</option>
                        ))}
                      </select>
                    </div>
                    <div><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Loja</label>
                      <select value={editAcesso.loja} onChange={(e)=>setEditAcesso({...editAcesso, loja:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500">
                        {lojasDisponiveis.map(loja => <option key={loja} value={loja}>{loja}</option>)}
                      </select>
                    </div>
                    <div><label className="text-[10px] font-bold text-slate-300 font-mono uppercase">Status</label>
                      <select value={editAcesso.status} onChange={(e)=>setEditAcesso({...editAcesso, status:e.target.value})} className="w-full bg-slate-900 border border-white/5 rounded-xl px-3 py-2 text-xs text-slate-100 focus:outline-none focus:border-indigo-500">
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                      </select>
                    </div>
                  </div>
                  <div className="flex justify-end gap-3 pt-4 border-t border-white/5">
                    <button type="button" onClick={()=>setShowEditModal(false)} className="px-4 py-2 bg-slate-800 hover:bg-slate-750 text-slate-300 rounded-xl text-xs font-semibold cursor-pointer">Cancelar</button>
                    <button type="submit" className="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold shadow-md shadow-indigo-600/15 cursor-pointer">Salvar Alterações</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
